<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Side hustle tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>

  <div class="container">

    <!-- Header -->
    <header>
      <div>
        <h1>Side hustle tracker</h1>
        <p class="days-logged" id="days-logged">0 days logged</p>
      </div>
      <div class="header-right">
        <span class="rate-avg" id="rate-avg"></span>
        <button id="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">
          <span class="icon-sun">☀︎</span>
          <span class="icon-moon">☾</span>
        </button>
      </div>
    </header>

    <!-- Stats -->
    <section class="stats">
      <div class="stat">
        <span class="stat-label">TOTAL REVENUE</span>
        <span class="stat-value green" id="stat-revenue">$0</span>
      </div>
      <div class="stat">
        <span class="stat-label">TOTAL HOURS</span>
        <span class="stat-value blue" id="stat-hours">0h</span>
      </div>
      <div class="stat">
        <span class="stat-label">AVG / DAY</span>
        <span class="stat-value" id="stat-avg">$0</span>
      </div>
      <div class="stat">
        <span class="stat-label">BEST DAY</span>
        <span class="stat-value orange" id="stat-best-val">—</span>
        <span class="stat-sub" id="stat-best-date"></span>
      </div>
    </section>

    <!-- Tabs -->
    <div class="tabs-bar">
      <button class="tab active" data-tab="chart">Chart</button>
      <button class="tab" data-tab="log">Log</button>
    </div>

    <!-- Chart panel -->
    <section class="tab-panel" id="panel-chart">
      <div class="legend">
        <span class="legend-item green-dot">Revenue</span>
        <span class="legend-item orange-dash">$/hr rate</span>
      </div>
      <div class="chart-wrap">
        <canvas id="revenue-chart"></canvas>
      </div>

      <div class="legend top-gap">
        <span class="legend-item blue-dot">Hours worked</span>
      </div>
      <div class="chart-wrap">
        <canvas id="hours-chart"></canvas>
      </div>
    </section>

    <!-- Log panel -->
    <section class="tab-panel hidden" id="panel-log">
      <table class="entries-table">
        <thead>
          <tr>
            <th>DATE</th>
            <th>REVENUE</th>
            <th>HOURS</th>
            <th>$/HR</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="entries-body"></tbody>
      </table>
    </section>

    <!-- Log form — always visible -->
    <section class="log-form-section">
      <h2 class="log-title">Log a day</h2>
      <div class="log-form-header">
        <span>Date</span>
        <span>Revenue ($)</span>
        <span>Hours</span>
        <span></span>
      </div>
      <div class="log-form">
        <input type="date" id="date-input" />
        <input type="number" id="revenue-input" placeholder="0.00" step="0.01" min="0" />
        <input type="number" id="hours-input" placeholder="0.0" step="0.1" min="0.1" />
        <button id="add-btn">Add entry</button>
      </div>
      <p class="log-hint">Enter a valid date, revenue (≥ $0), and hours (&gt; 0).</p>
      <p class="log-hint">Logging the same date replaces that entry.</p>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
